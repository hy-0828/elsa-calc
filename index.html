<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾莎计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            color: #eee;
        }

        body {
            background: #1a1a22;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .wrap {
            display: flex;
            gap: 0;
            margin: 0;
            padding: 25px 20px 20px 20px;
            align-items: flex-start;
            position: relative;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 340px;
            background: #252532;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 15px #111;
        }

        .expand-btn {
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: #444;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 10;
        }

        .record-side {
            width: 360px;
            background: #252532;
            border-radius: 12px;
            box-shadow: 0 2px 15px #111;
            padding: 15px;
            max-height: 680px;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .record-hide {
            width: 0;
            padding: 0;
            border: none;
            overflow: hidden;
        }

        h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #ffffff;
            font-size: 18px;
        }

        .rate-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .rate-item { flex: 1; position: relative; }
        label { display: block; font-size: 13px; color: #b0b0c0; margin-bottom: 3px; }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            background: #333344;
            outline: none;
        }

        .data-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        .data-item { flex: 1; min-width: 110px; }

        .btn-group { 
            display: flex; 
            gap: 6px; 
            margin: 16px 0; 
            flex-wrap: wrap; 
            position: relative; 
        }
        .tip-msg {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: #f53f3f;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            white-space: nowrap;
        }
        .oper-btn {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .calc-btn { background: #2b7def; }
        .record-btn { background: #10b981; }
        .back-btn { background: #9362d9; }
        .clear-btn { background: #c83c3c; }

        .result-box {
            background: #303042;
            padding: 12px;
            border-radius: 8px;
            margin: 14px 0;
        }
        .result-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 4px 0; 
            font-size: 14px; 
        }

        .keyboard {
            position: absolute;
            width: 320px;
            background: #252532;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            z-index: 999;
            display: none;
        }
        .key {
            height: 40px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #3a3a4f;
        }
        .key:hover { background: #4a4a62; }
        .key.del { background: #c83c3c; }
        .key.ok { background: #2b7def; }
    </style>
</head>
<body id="pageWrap">

    <div class="wrap">
        <div class="container">
            <h2>艾莎计算器</h2>

            <div class="rate-row">
                <div class="rate-item">
                    <label>红倍率</label>
                    <input type="text" id="rate1" value="3.5" readonly>
                </div>
                <div class="rate-item">
                    <label>金倍率</label>
                    <input type="text" id="rate2" value="0.85" readonly>
                </div>
            </div>

            <div class="data-row">
                <div class="data-item">
                    <label>余格</label>
                    <input type="text" id="yg" readonly placeholder="点击输入">
                </div>
                <div class="data-item">
                    <label>金价</label>
                    <input type="text" id="jj" readonly placeholder="点击输入">
                </div>
            </div>
            <div class="data-row">
                <div class="data-item">
                    <label>现价</label>
                    <input type="text" id="xj" readonly placeholder="点击输入">
                </div>
                <div class="data-item">
                    <label>实价</label>
                    <input type="text" id="sj" readonly placeholder="点击输入">
                </div>
            </div>

            <div class="btn-group">
                <div class="tip-msg" id="tipMsg">实价未填写</div>
                <button class="oper-btn calc-btn" onclick="calculate()">计算</button>
                <button class="oper-btn record-btn" onclick="saveRecord()">记录本次</button>
                <button class="oper-btn back-btn" onclick="rollBackData()">回退</button>
                <button class="oper-btn clear-btn" onclick="clearAll()">全部清空</button>
            </div>

            <div class="result-box">
                <div class="result-item"><span>底价:</span><span id="dj">0</span></div>
                <div class="result-item"><span>顶价:</span><span id="ding">0</span></div>
                <div class="result-item"><span>底价比:</span><span id="djb">0.00</span></div>
                <div class="result-item"><span>顶价比:</span><span id="dingb">0.00</span></div>
            </div>
        </div>

        <div class="expand-btn" onclick="toggleRecord()">▶</div>
        <div class="record-side record-hide" id="recordPanel">
            <table id="recordTable">
                <thead>
                <tr>
                    <th>时间</th>
                    <th>余格</th>
                    <th>金价</th>
                    <th>现价</th>
                    <th>实价</th>
                    <th>底价</th>
                    <th>顶价</th>
                    <th>底价比</th>
                    <th>顶价比</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="keyboard" id="numKeyboard">
        <button class="key" onclick="numClick(1)">1</button>
        <button class="key" onclick="numClick(2)">2</button>
        <button class="key" onclick="numClick(3)">3</button>
        <button class="key del" onclick="delClick()">退格</button>
        <button class="key" onclick="numClick(4)">4</button>
        <button class="key" onclick="numClick(5)">5</button>
        <button class="key" onclick="numClick(6)">6</button>
        <button class="key" onclick="numClick('.')">.</button>
        <button class="key" onclick="numClick(7)">7</button>
        <button class="key" onclick="numClick(8)">8</button>
        <button class="key" onclick="numClick(9)">9</button>
        <button class="key ok" onclick="hideKeyboard()">确定</button>
        <button class="key" onclick="numClick(0)">0</button>
        <button class="key" onclick="clearInput()">清空</button>
    </div>

<script>
    const fs = require('fs');
    const path = require('path');
    const dataPath = path.join(__dirname, 'recordData.json');
    let recordArr = [];
    let tempVal = '';
    let activeInput = null;
    let recordOpen = false;

    const keyboard = document.getElementById('numKeyboard');
    const tipMsg = document.getElementById('tipMsg');
    const recordPanel = document.getElementById('recordPanel');
    const expandBtn = document.querySelector('.expand-btn');
    const dataInputs = ['yg', 'jj', 'xj', 'sj'];

    function loadRecord() {
        try {
            if (fs.existsSync(dataPath)) {
                let txt = fs.readFileSync(dataPath, 'utf8');
                recordArr = JSON.parse(txt);
                renderTable();
            }
        } catch (e) {
            recordArr = [];
        }
    }

    function saveLocalData() {
        fs.writeFileSync(dataPath, JSON.stringify(recordArr, null, 2), 'utf8');
    }

    function toggleRecord() {
        recordOpen = !recordOpen;
        if (recordOpen) {
            recordPanel.classList.remove('record-hide');
            expandBtn.innerText = '◀';
        } else {
            recordPanel.classList.add('record-hide');
            expandBtn.innerText = '▶';
        }
    }

    function rollBackData() {
        if (recordArr.length <= 0) return;
        const lastData = recordArr.shift();
        saveLocalData();
        document.getElementById('yg').value = lastData.yg;
        document.getElementById('jj').value = lastData.jj;
        document.getElementById('xj').value = lastData.xj;
        document.getElementById('sj').value = lastData.sj;
        document.getElementById('dj').innerText = lastData.dj;
        document.getElementById('ding').innerText = lastData.ding;
        document.getElementById('djb').innerText = lastData.djb;
        document.getElementById('dingb').innerText = lastData.dingb;
        renderTable();
    }

    function checkAutoCalc() {
        const ygVal = document.getElementById('yg').value.trim();
        const jjVal = document.getElementById('jj').value.trim();
        const xjVal = document.getElementById('xj').value.trim();
        if (ygVal && jjVal && xjVal) calculate();
    }

    // 输入框点击弹出键盘
    ['rate1','rate2','yg','jj','xj','sj'].forEach(id => {
        const inp = document.getElementById(id);
        inp.addEventListener('click', () => {
            inp.value = '';
            activeInput = inp;
            tempVal = '';
            const rect = inp.getBoundingClientRect();
            keyboard.style.left = rect.left + 'px';
            keyboard.style.top = rect.bottom + window.scrollY + 8 + 'px';
            keyboard.style.display = 'grid';
        });
    });

    document.getElementById('pageWrap').addEventListener('click', e => {
        if (!keyboard.contains(e.target)) hideKeyboard();
    });

    function hideKeyboard() {
        keyboard.style.display = 'none';
        activeInput = null;
    }

    function numClick(num) {
        if (!activeInput) return;
        if (tempVal === '' && num === '.') return;
        if (tempVal.includes('.') && num === '.') return;
        tempVal += num;
        activeInput.value = tempVal;
        checkAutoCalc();
    }

    function delClick() {
        if (!activeInput) return;
        tempVal = tempVal.slice(0, -1);
        activeInput.value = tempVal || '';
        checkAutoCalc();
    }

    function clearInput() {
        if (!activeInput) return;
        tempVal = '';
        activeInput.value = '';
        checkAutoCalc();
    }

    function calculate() {
        const rate1 = parseFloat(document.getElementById('rate1').value) || 3.5;
        const rate2 = parseFloat(document.getElementById('rate2').value) || 0.85;
        const yg = parseFloat(document.getElementById('yg').value) || 0;
        const jj = parseFloat(document.getElementById('jj').value) || 0;
        const xj = parseFloat(document.getElementById('xj').value) || 0;
        const sj = parseFloat(document.getElementById('sj').value) || 0;

        const dj = (xj - yg * rate1).toFixed(2);
        const ding = (xj + yg * rate2).toFixed(2);
        const djb = jj ? ((dj / jj) * 100).toFixed(2) : '0.00';
        const dingb = jj ? ((ding / jj) * 100).toFixed(2) : '0.00';

        document.getElementById('dj').innerText = dj;
        document.getElementById('ding').innerText = ding;
        document.getElementById('djb').innerText = djb;
        document.getElementById('dingb').innerText = dingb;
    }

    function saveRecord() {
        const sjVal = document.getElementById('sj').value.trim();
        if (!sjVal) {
            tipMsg.style.display = 'block';
            setTimeout(() => tipMsg.style.display = 'none', 1500);
            return;
        }
        const time = new Date().toLocaleTimeString();
        const yg = document.getElementById('yg').value;
        const jj = document.getElementById('jj').value;
        const xj = document.getElementById('xj').value;
        const sj = sjVal;
        const dj = document.getElementById('dj').innerText;
        const ding = document.getElementById('ding').innerText;
        const djb = document.getElementById('djb').innerText;
        const dingb = document.getElementById('dingb').innerText;

        recordArr.unshift({ time, yg, jj, xj, sj, dj, ding, djb, dingb });
        saveLocalData();
        renderTable();
        dataInputs.forEach(id => document.getElementById(id).value = '');
    }

    function renderTable() {
        const tbody = document.querySelector('#recordTable tbody');
        let html = '';
        recordArr.forEach(item => {
            html += `<tr>
                <td>${item.time}</td><td>${item.yg}</td><td>${item.jj}</td><td>${item.xj}</td><td>${item.sj}</td>
                <td>${item.dj}</td><td>${item.ding}</td><td>${item.djb}</td><td>${item.dingb}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function clearAll() {
        dataInputs.forEach(id => document.getElementById(id).value = '');
        document.getElementById('dj').innerText = '0';
        document.getElementById('ding').innerText = '0';
        document.getElementById('djb').innerText = '0.00';
        document.getElementById('dingb').innerText = '0.00';
        tempVal = '';
        hideKeyboard();
    }

    window.onload = loadRecord;
</script>
</body>
</html>
