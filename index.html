<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾莎计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            color: #eee;
        }

        body {
            background: #1a1a22;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        /* 自定义标题栏 */
        .title-bar {
            height: 38px;
            background: #1f1f28;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            -webkit-app-region: drag;
            border-bottom: 1px solid #333;
        }

        .title {
            font-size: 14px;
            color: #ddd;
        }

        .title-buttons {
            display: flex;
            gap: 6px;
        }

        .title-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .title-btn:hover {
            background: #3a3a4f;
        }

        .title-btn.close:hover {
            background: #e81123;
        }

        .wrap {
            display: flex;
            gap: 0;
            margin: 0;
            padding: 20px;
            align-items: flex-start;
            position: relative;
            justify-content: center;
            height: calc(100vh - 38px);
            box-sizing: border-box;
        }

        .container {
            width: 340px;
            background: #252532;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 15px #111;
        }

        .expand-btn {
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: #444;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 10;
        }

        .record-side {
            width: 360px;
            background: #252532;
            border-radius: 12px;
            box-shadow: 0 2px 15px #111;
            padding: 15px;
            max-height: 680px;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .record-hide {
            width: 0;
            padding: 0;
            border: none;
            overflow: hidden;
        }

        /* 下面样式保持不变 */
        h2 { text-align: center; margin-bottom: 18px; color: #ffffff; font-size: 18px; }
        .rate-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .rate-item { flex: 1; }
        label { display: block; font-size: 13px; color: #b0b0c0; margin-bottom: 3px; }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            background: #333344;
            outline: none;
        }
        .data-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        .data-item { flex: 1; min-width: 110px; }
        .btn-group { display: flex; gap: 6px; margin: 16px 0; flex-wrap: wrap; position: relative; }
        .oper-btn {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .calc-btn { background: #2b7def; }
        .record-btn { background: #10b981; }
        .back-btn { background: #9362d9; }
        .clear-btn { background: #c83c3c; }
        .result-box {
            background: #303042;
            padding: 12px;
            border-radius: 8px;
            margin: 14px 0;
        }
        .result-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
        .keyboard { position: absolute; width: 320px; background: #252532; border: 1px solid #444; border-radius: 8px; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; z-index: 999; display: none; }
        .key { height: 40px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; background: #3a3a4f; }
        .key:hover { background: #4a4a62; }
        .key.del { background: #c83c3c; }
        .key.ok { background: #2b7def; }
    </style>
</head>
<body id="pageWrap">
    <!-- 自定义标题栏 -->
    <div class="title-bar">
        <div class="title">艾莎计算器</div>
        <div class="title-buttons">
            <div class="title-btn" onclick="window.minimizeWindow()">−</div>
            <div class="title-btn close" onclick="window.closeWindow()">×</div>
        </div>
    </div>

    <div class="wrap">
        <div class="container">
            <h2>艾莎计算器</h2>

            <div class="rate-row">
                <div class="rate-item"><label>红倍率</label><input type="text" id="rate1" value="3.5" readonly></div>
                <div class="rate-item"><label>金倍率</label><input type="text" id="rate2" value="0.85" readonly></div>
            </div>

            <div class="data-row">
                <div class="data-item"><label>余格</label><input type="text" id="yg" readonly placeholder="点击输入"></div>
                <div class="data-item"><label>金价</label><input type="text" id="jj" readonly placeholder="点击输入"></div>
            </div>
            <div class="data-row">
                <div class="data-item"><label>现价</label><input type="text" id="xj" readonly placeholder="点击输入"></div>
                <div class="data-item"><label>实价</label><input type="text" id="sj" readonly placeholder="点击输入"></div>
            </div>

            <div class="btn-group">
                <div class="tip-msg" id="tipMsg">实价未填写</div>
                <button class="oper-btn calc-btn" onclick="calculate()">计算</button>
                <button class="oper-btn record-btn" onclick="saveRecord()">记录本次</button>
                <button class="oper-btn back-btn" onclick="rollBackData()">回退</button>
                <button class="oper-btn clear-btn" onclick="clearAll()">全部清空</button>
            </div>

            <div class="result-box">
                <div class="result-item"><span>底价:</span><span id="dj">0</span></div>
                <div class="result-item"><span>顶价:</span><span id="ding">0</span></div>
                <div class="result-item"><span>底价比:</span><span id="djb">0.00</span></div>
                <div class="result-item"><span>顶价比:</span><span id="dingb">0.00</span></div>
            </div>
        </div>

        <div class="expand-btn" onclick="toggleRecord()">▶</div>
        <div class="record-side record-hide" id="recordPanel">
            <table id="recordTable">
                <thead>
                <tr>
                    <th>时间</th><th>余格</th><th>金价</th><th>现价</th><th>实价</th>
                    <th>底价</th><th>顶价</th><th>底价比</th><th>顶价比</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 数字键盘 -->
    <div class="keyboard" id="numKeyboard">
        <button class="key" onclick="numClick(1)">1</button>
        <button class="key" onclick="numClick(2)">2</button>
        <button class="key" onclick="numClick(3)">3</button>
        <button class="key del" onclick="delClick()">退格</button>
        <button class="key" onclick="numClick(4)">4</button>
        <button class="key" onclick="numClick(5)">5</button>
        <button class="key" onclick="numClick(6)">6</button>
        <button class="key" onclick="numClick('.')">.</button>
        <button class="key" onclick="numClick(7)">7</button>
        <button class="key" onclick="numClick(8)">8</button>
        <button class="key" onclick="numClick(9)">9</button>
        <button class="key ok" onclick="hideKeyboard()">确定</button>
        <button class="key" onclick="numClick(0)">0</button>
        <button class="key" onclick="clearInput()">清空</button>
    </div>

<script>
    const fs = require('fs');
    const path = require('path');
    const dataPath = path.join(__dirname, 'recordData.json');
    let recordArr = [];
    let tempVal = '';
    let activeInput = null;
    let recordOpen = false;

    const keyboard = document.getElementById('numKeyboard');
    const tipMsg = document.getElementById('tipMsg');
    const recordPanel = document.getElementById('recordPanel');
    const expandBtn = document.querySelector('.expand-btn');
    const dataInputs = ['yg', 'jj', 'xj', 'sj'];

    // 窗口控制函数
    window.minimizeWindow = () => { require('electron').remote.getCurrentWindow().minimize(); };
    window.closeWindow = () => { require('electron').remote.getCurrentWindow().close(); };

    // 其余JavaScript代码（保持你原来的逻辑）
    function loadRecord() {
        try {
            if (fs.existsSync(dataPath)) {
                recordArr = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
                renderTable();
            }
        } catch (e) { recordArr = []; }
    }

    function saveLocalData() {
        fs.writeFileSync(dataPath, JSON.stringify(recordArr, null, 2), 'utf8');
    }

    function toggleRecord() {
        recordOpen = !recordOpen;
        recordPanel.classList.toggle('record-hide');
        expandBtn.innerText = recordOpen ? '◀' : '▶';
    }

    // ... 其他函数（calculate, saveRecord, renderTable 等）保持不变 ...
    // （为了节省篇幅，这里省略了你原来的完整JS，如果你需要我补全全部JS请告诉我）

    window.onload = loadRecord;
</script>
</body>
</html>
